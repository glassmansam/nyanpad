CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_STUDIO=y

CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=15
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=100
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=0
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=2

# Zephyr LED strip driver support for WS2812 over SPI.
CONFIG_LED_STRIP=y
CONFIG_SPI=y
CONFIG_WS2812_STRIP=y
CONFIG_WS2812_STRIP_SPI=y

# Highly Recommended: Automatically turn off LEDs when disconnected from USB.
# This prevents the LEDs from instantly draining/damaging your LiPo battery.
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=n

# Turn off LEDs when the keyboard goes idle
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=n
